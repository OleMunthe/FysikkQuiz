<body>

<a href="../index.html">← Tilbake til hovedsiden</a>

<div class="status">
    <div class="progress-bar">
        <div class="progress" id="progress"></div>
    </div>
    <div class="teller">
        Riktig: <span id="riktig">0</span> |
        Feil: <span id="feil">0</span> |
        Score: <span id="prosent">0</span>%
    </div>
</div>







<div class="container">
    <div class="box">
        <p>Strekningen \(s\) en bil har tilbakelagt er etter \(t\) sekunder</p>
        $$
                s(t) = 0,25 \cdot t^3 \;\;\;\;,\;\;\;\; 0 \leq t \leq 10
        $$
        <p><strong>Hvor stor er akselerasjonen til bilen etter 10 sekunder?</strong></p>

        <form id="quiz">
            <label class="svar">
                <input type="radio" name="svar" value="feil">
                <span>15 m/s\(^2\)</span>
            </label>
            <label class="svar">
                <input type="radio" name="svar" value="riktig">
                <span>75 m/s\(^2\)</span>
            </label>
            <label class="svar">
                <input type="radio" name="svar" value="feil">
                <span>25 m/s\(^2\)</span>
            </label>
            <label class="svar">
                <input type="radio" name="svar" value="feil">
                <span>7,5 m/s\(^2\)</span>
            </label>
        </form>

        <div id="resultat"></div>
        <button id="neste" onclick="nesteSporsmal()">Neste spørsmål</button>
    </div>

    <div class="box" style="display: grid; place-items: center;">
    <img src="racer2.png" alt="En racerbil">
    </div>

</div>


</body>
