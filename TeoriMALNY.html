<!DOCTYPE html>
<html lang="no">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="UTF-8">
  <title>Bevegelseslikningene</title>

  <!-- MathJax -->
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      max-width: 900px;
      margin: auto;
      line-height: 1.6;
      background-color: #fafafa;
    }

    h1, h2, h3 {
      margin-top: 2em;
    }

    img {
      max-width: 100%;
      display: block;
      margin: 1em auto;
    }

    /* ---------- BOKSER ---------- */

    /* Definisjon */
    .definition {
      background-color: #ecfeff;
      border-left: 6px solid #0891b2;
      padding: 1.2em 1.5em;
      margin: 2em 0;
      border-radius: 8px;
    }

    .definition h3::before {
      content: "📘 ";
    }

    /* Eksempel */
    .example {
      background-color: #ecfdf5;
      border: 2px solid #10b981;
      border-left-width: 6px;
      padding: 1.2em 1.5em;
      margin: 2em 0;
      border-radius: 10px;
    }

    .example h3 {
      margin-top: 0;
      color: #065f46;
    }

    .example h3::before {
      content: "📌 ";
    }

    .solution {
      background-color: #ffffff;
      border: 1px dashed #34d399;
      padding: 1em;
      margin-top: 1em;
      border-radius: 6px;
    }

    /* Merk */
    .note {
      background-color: #fff7ed;
      border-left: 6px solid #f59e0b;
      padding: 1.2em 1.5em;
      margin: 2em 0;
      border-radius: 8px;
    }

    .note strong::before {
      content: "⚠️ ";
    }

    /* Programkode */
    .codebox {
      background-color: #0f172a;
      color: #e5e7eb;
      padding: 1.5em;
      border-radius: 10px;
      margin: 2em 0;
      overflow-x: auto;
      font-family: Consolas, Monaco, monospace;
    }

    .codebox::before {
      content: "💻 Programkode";
      display: block;
      color: #34d399;
      margin-bottom: 0.8em;
      font-weight: bold;
    }

    /* ===========================
   Mobiltilpasning
   =========================== */

@media (max-width: 700px) {

  body {
    padding: 1em;
    font-size: 1rem;
  }

  h1 {
    font-size: 1.7rem;
  }

  h2 {
    font-size: 1.4rem;
  }

  h3 {
    font-size: 1.2rem;
  }

  /* Bokser: mindre padding på mobil */
  .example,
  .definition,
  .note,
  .codebox {
    padding: 1em;
    margin: 1.5em 0;
  }

  /* Bilder: litt større på mobil */
  img {
    width: 100% !important;
    max-width: 100%;
  }

  /* Programkode: lettere å lese */
  .codebox {
    font-size: 0.9rem;
  }

}

/* ===== Skriv til PDF-knapp ===== */

.print-button {
  display: block;
  margin: 1.5em auto;
  padding: 0.6em 1.4em;
  font-size: 1rem;
  font-weight: bold;
  background-color: #10b981;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.print-button:hover {
  background-color: #059669;
}

/* Skjul knappen på mobil */
@media (max-width: 700px) {
  .print-button {
    display: none;
  }
}

@media print {
  .print-button {
    display: none;
  }
}


/* ===========================
   PDF / Utskrift
   =========================== */

@media print {

  /* Generelle marger for A4 */
  body {
    margin: 1.5cm;
    background: white;
  }

  /* Overskrifter starter på ny side */
  h1,
  h2 {
    page-break-before: always;
  }

  /* Aldri del disse boksene over sider */
  .definition,
  .example,
  .note,
  .codebox {
    page-break-inside: avoid;
  }

  /* Tillat at løsninger deles om nødvendig */
  .solution {
    page-break-inside: auto;
  }

  /* Bilder bør heller flyttes enn å deles */
  img {
    page-break-inside: avoid;
  }

  /* PDF skal ikke vise knappen */
  .print-button {
    display: none !important;
  }
}
@media print {
  .no-print {
    display: none;
  }
}
  </style>
</head>

<body>
<a href="../index.html" class="no-print">← Tilbake til hovedsiden</a>
<button class="print-button" onclick="window.print()">
  🖨️ Skriv til PDF
</button>



</body>
</html>
