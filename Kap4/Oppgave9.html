<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0877ab">

<title>Flervalgsoppgaver Fysikk 1</title>

<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<link rel="stylesheet" href="../FlervalgsStyle.css">
<script src="../FlervalgScript.js" defer></script>

<style>
img {
    max-height: 300px;
    max-width: 450px;
}
</style>
</head>

<body>

<a href="../index.html">← Tilbake til hovedsiden</a>

<div class="status">
    <div class="progress-bar">
        <div class="progress" id="progress"></div>
    </div>
    <div class="teller">
        Riktig: <span id="riktig">0</span> |
        Feil: <span id="feil">0</span> |
        Score: <span id="prosent">0</span>%
    </div>
</div>

<div class="container">
    <div class="box">
        <p>En kasse med masse \(m\) dyttes en strekning \(s\) bortover et horisontalt, friksjonsfritt underlag.</p>
            
            <p>Dyttekraften er \(F\) og virker horisontalt.</p>

        <p>Kassa starter i ro og får farten \(v\) etter strekningen \(s\).</p>

        <p><strong>Hva er riktig sammenheng?</strong></p>

        <form id="quiz">
            <label class="svar" tabindex="0">
                <input type="radio" name="svar" value="riktig">
                <span>\( \frac{1}{2} mv^2 = F \cdot s \)</span>
            </label>

            <label class="svar" tabindex="0">
                <input type="radio" name="svar" value="feil">
                <span>\( \frac{1}{2} mv^2 = F \)</span>
            </label>

            <label class="svar" tabindex="0">
                <input type="radio" name="svar" value="feil">
                <span>\( mv = F \cdot s \)</span>
            </label>

            <label class="svar" tabindex="0">
                <input type="radio" name="svar" value="feil">
                <span>\( mv = F \)</span>
            </label>
        </form>

        <button id="neste" onclick="nesteSporsmal()">Neste spørsmål</button>
    </div>

    <div class="box" style="display: grid; place-items: center;">
        <img src="Ek.png" alt="">
    </div>
</div>

</body>
</html>
