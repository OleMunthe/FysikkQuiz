<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flervalgsoppgaver Fysikk 1</title>

<!-- MathJax -->
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<link rel="stylesheet" href="../FlervalgsStyle.css">

<script src="../FlervalgScript.js" defer></script>

<style>
img {
       max-height: 300px; /* Maks høyde */
    max-width: 550px; /* Maks bredde*/    
}
</style>
</head>



<body>

<a href="../index.html">← Tilbake til hovedsiden</a>

<div class="status">
    <div class="progress-bar">
        <div class="progress" id="progress"></div>
    </div>
    <div class="teller">
        Riktig: <span id="riktig">0</span> |
        Feil: <span id="feil">0</span> |
        Score: <span id="prosent">0</span>%
    </div>
</div>

<div class="container">
    <div class="box">
        <p>I stjerner kan atomkjerner smelte sammen og danne nye grunnstoffer. Den
        vanligste reaksjonsen er illustrert nedenfor.</p>
        
        <p><strong>I hvilket reaksjonstrinn skapes nøytrinoer?</strong></p>

        <form id="quiz">
            <label class="svar">
                <input type="radio" name="svar" value="riktig">
                <span>\( 2\mathrm{H} \rightarrow {}^{2}_{1}\mathrm{H} + e + \bar{\nu}_e \)</span>
            </label>
            <label class="svar">
                <input type="radio" name="svar" value="feil">
                <span>\( 2\mathrm{H} \rightarrow {}^{2}_{2}\mathrm{He} + e + \bar{\nu}_e \)</span>
            </label>
            <label class="svar">
                <input type="radio" name="svar" value="feil">
                <span>\( {}^{2}_{1}\mathrm{H} + \mathrm{H} \rightarrow {}^{3}_{2}\mathrm{He} + \bar{\nu}_e \)</span>
            </label>
            <label class="svar">
                <input type="radio" name="svar" value="feil">
                <span>\( {}^{3}_{2}\mathrm{He} + {}^{3}_{2}\mathrm{He} \rightarrow {}^{4}_{2}\mathrm{He} + 2\mathrm{H} + 2\bar{\nu}_e \)</span>
            </label>
        </form>

        <div id="resultat"></div>
        <button id="neste" onclick="nesteSporsmal()">Neste spørsmål</button>
    </div>

    <div class="box">
        <img src="4HHe.png" alt="En person som slipper en stein" >
    </div>
</div>



</body>
</html>
