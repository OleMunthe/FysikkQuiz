<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0877ab">

<title>Flervalgsoppgaver Fysikk 1</title>

<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<link rel="stylesheet" href="../FlervalgsStyle.css">
<script src="../FlervalgScript.js" defer></script>

</head>

<body>

<a href="../index.html">← Tilbake til hovedsiden</a>

<div class="status">
    <div class="progress-bar">
        <div class="progress" id="progress"></div>
    </div>
    <div class="teller">
        Riktig: <span id="riktig">0</span> |
        Feil: <span id="feil">0</span> |
        Score: <span id="prosent">0</span>%
    </div>
</div>

<div class="container">
    <div class="box">
        <p>Jupiter er ca. 5 ganger så langt fra sola som det jorda er.</p>

        <p>Innstrålingstettheten fra sola på jorda er \(E_{\text{jord}}\).</p>

        <p><strong>Hva er riktig?</strong></p>

        <form id="quiz">
            <label class="svar" tabindex="0">
                <input type="radio" name="svar" value="riktig">
                <span>\( E_{\text{jupiter}} = \frac{E_{\text{jord}}}{25} \)</span>
            </label>

            <label class="svar" tabindex="0">
                <input type="radio" name="svar" value="feil">
                <span>\( E_{\text{jupiter}} = \frac{E_{\text{jord}}}{5} \)</span>
            </label>

            <label class="svar" tabindex="0">
                <input type="radio" name="svar" value="feil">
                <span>\( E_{\text{jupiter}} = 25 \cdot E_{\text{jord}} \)</span>
            </label>

            <label class="svar" tabindex="0">
                <input type="radio" name="svar" value="feil">
               <span>\( E_{\text{jupiter}} = 5 \cdot E_{\text{jord}} \)</span>
            </label>
        </form>

        <button id="neste" onclick="nesteSporsmal()">Neste spørsmål</button>
    </div>

</div>

</body>
</html>
