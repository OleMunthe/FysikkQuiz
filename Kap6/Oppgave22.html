<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0877ab">

<title>Flervalgsoppgaver Fysikk 1</title>

<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<link rel="stylesheet" href="../FlervalgsStyle.css">
<script src="../FlervalgScript.js" defer></script>

<style>
img {
    max-height: 300px;
    max-width: 450px;
}
</style>
</head>

<body>

<a href="../index.html">← Tilbake til hovedsiden</a>

<div class="status">
    <div class="progress-bar">
        <div class="progress" id="progress"></div>
    </div>
    <div class="teller">
        Riktig: <span id="riktig">0</span> |
        Feil: <span id="feil">0</span> |
        Score: <span id="prosent">0</span>%
    </div>
</div>

<div class="container">
    <div class="box">
        <p>Isbiter med temperatur \(-10^{\circ}\text{C}\) legges i et glass med cola. </p>

        <p>Vi lar glasset stå helt til alle isbitene har smeltet.</p>

        <p><strong>Hva tar mest varme fra colaen/omgivelsene?</strong></p>

        <form id="quiz">
            <label class="svar" tabindex="0">
                <input type="radio" name="svar" value="riktig">
                <span>Smeltingen av isbitene.</span>
            </label>

            <label class="svar" tabindex="0">
                <input type="radio" name="svar" value="feil">
                <span>Temperaturøkningen av isbitene fra \(-10^{\circ}\text{C}\) til \(0^{\circ}\text{C}\).</span>
            </label>

        </form>

        <button id="neste" onclick="nesteSporsmal()">Neste spørsmål</button>
    </div>

    <div class="box" style="display: grid; place-items: center;">
        <img src="ColaIsbiter.jpg" alt="">
    </div>
</div>

</body>
</html>
