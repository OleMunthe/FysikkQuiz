<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flervalgsoppgaver Fysikk 1</title>

<!-- MathJax -->
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<link rel="stylesheet" href="../FlervalgsStyle.css">

<script src="../FlervalgScript.js" defer></script>

<style>
img {
       max-height: 300px; /* Maks høyde */
    max-width: 550px; /* Maks bredde*/    
}
</style>
</head>



<body>

<a href="../index.html">← Tilbake til hovedsiden</a>

<div class="status">
    <div class="progress-bar">
        <div class="progress" id="progress"></div>
    </div>
    <div class="teller">
        Riktig: <span id="riktig">0</span> |
        Feil: <span id="feil">0</span> |
        Score: <span id="prosent">0</span>%
    </div>
</div>







<div class="container">
    <div class="box">
        <p>Figuren illustrerer hva som skjer når vi sender hvitt lys gjennom en hydrogengass.</p>
        
        <p><strong>Hva kan skje hvis vi istedenfor å sende hvitt lys gjennom gassen, skyter elektroner inn i gassen?</strong></p>

        <form id="quiz">
            <label class="svar">
                <input type="radio" name="svar" value="feil">
                <span>Vi kan få både et emisjons- og absorpsjonsspekter, akkurat som når vi sender hvitt lys gjennom.</span>
            </label>
            <label class="svar">
                <input type="radio" name="svar" value="riktig">
                <span>Vi kan bare få et emisjonsspekter, med de samme fargene som når vi sender hvitt lys.</span>
            </label>
            <label class="svar">
                <input type="radio" name="svar" value="feil">
                <span>Vi kan bare få et absorpsjonsspekter, med de samme fargene som når vi sender hvitt lys.</span>
            </label>
            <label class="svar">
                <input type="radio" name="svar" value="feil">
                <span>Vi kan få et absorpsjonsspekter, men med ulike farger enn det vi får når vi sender hvitt lys.</span>
            </label>
        </form>

        <div id="resultat"></div>
        <button id="neste" onclick="nesteSporsmal()">Neste spørsmål</button>
    </div>

    <div class="box">
        <img src="EmoAbso.png" alt="En person som slipper en stein" >
    </div>
</div>


</body>
</html>
